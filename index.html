            text-align: center;

        }
        header h1 { font-size: 2.2rem; letter-spacing: 1px; }
        header p { margin-top: 8px; opacity: 0.8; font-size: 1rem; }
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .filters button {
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .filters button:hover, .filters button.active {
            background: #e94560;
            border-color: #e94560;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }
        .card-header .brand-badge {
            background: #e94560;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .card-header .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4ecca3;
        }
        .card-images {
            display: flex;
            height: 220px;
            overflow: hidden;
            background: #fafafa;
        }
        .card-images img {
            flex: 1;
            min-width: 0;
            object-fit: contain;
            padding: 10px;
            border-right: 1px solid #eee;
            background: white;
            transition: transform 0.3s;
        }
        .card-images img:last-child { border-right: none; }
        .card-images img:hover { transform: scale(1.05); z-index: 2; }
        .card-images .img-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #aaa;
            font-size: 0.8rem;
            text-align: center;
            padding: 10px;
        }
        .card-body { padding: 20px; }
        .card-body h3 {
            font-size: 1rem;
            margin-bottom: 4px;
            color: #1a1a2e;
            line-height: 1.3;
        }
        .card-body .type-badge {
            display: inline-block;
            background: #e8f4f8;
            color: #0f3460;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin: 6px 0 12px;
            font-weight: 500;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .spec-item {
            font-size: 0.8rem;
            color: #555;
        }
        .spec-item strong {
            color: #1a1a2e;
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .features {
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
        .features summary {
            font-size: 0.8rem;
            font-weight: 600;
            color: #0f3460;
            cursor: pointer;
            user-select: none;
        }
        .features ul {
            list-style: none;
            padding: 8px 0 0 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 4px;
        }
        .features li {
            font-size: 0.75rem;
            color: #666;
            padding-left: 16px;
            position: relative;
        }
        .features li::before {
            content: "\2713";
            position: absolute;
            left: 0;
            color: #4ecca3;
            font-weight: bold;
        }
        .qty-badge {
            font-size: 0.7rem;
            background: #fff3cd;
            color: #856404;
            padding: 2px 8px;
            border-radius: 8px;
            margin-left: 8px;
        }
        @media (max-width: 500px) {
            .grid { grid-template-columns: 1fr; }
            .card-images { height: 160px; }
            header h1 { font-size: 1.5rem; }
        }
    </style>

    function formatPrice(p) {
      return 'GHS ' + p.toLocaleString();
    }

    function renderCards(filtered) {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';
      filtered.forEach(p => {
        const imgHTML = p.images.length > 0
          ? p.images.slice(0, 3).map(url =>
              `<img src="${url}" alt="${p.model}" onerror="this.parentElement.replaceChild(Object.assign(document.createElement('div'),{className:'img-placeholder',textContent:'Image unavailable'}),this)">`
            ).join('')
          : `<div class="img-placeholder" style="width:100%">No image available<br>${p.brand} ${p.model}</div>`;

        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.brand = p.brand;
        card.dataset.type = p.type;
        card.innerHTML = `
          <div class="card-header">
            <div>
              <span class="brand-badge">${p.brand}</span>
              ${p.qty > 1 ? `<span class="qty-badge">x${p.qty}</span>` : ''}
            </div>
            <div class="price">${formatPrice(p.price)}</div>
          </div>
          <div class="card-images">${imgHTML}</div>
          <div class="card-body">
            <h3>${p.fullName}</h3>
            <span class="type-badge">${p.type}</span>
            <div class="specs-grid">
              <div class="spec-item"><strong>Model</strong>${p.model}</div>
              <div class="spec-item"><strong>Capacity</strong>${p.specs.capacity}</div>
              <div class="spec-item"><strong>Dimensions</strong>${p.specs.dimensions}</div>
              <div class="spec-item"><strong>Color</strong>${p.specs.color}</div>
            </div>
            <details class="features">
              <summary>Key Features (${p.features.length})</summary>
              <ul>${p.features.map(f => `<li>${f}</li>`).join('')}</ul>
            </details>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function filterCards(filter) {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (filter === 'all') {
        renderCards(products);
      } else {
        const filtered = products.filter(p =>
          p.brand === filter ||
          p.type.toLowerCase().includes(filter.toLowerCase())
        );
        renderCards(filtered);
      }
    }

    renderCards(products);
    </script>
