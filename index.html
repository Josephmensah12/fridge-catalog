<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Kitchen Appliance Catalog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #1a1a2e; }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white; padding: 30px 20px; text-align: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        header h1 { font-size: 2rem; letter-spacing: 1px; }
        header p { margin-top: 6px; opacity: 0.8; font-size: 0.9rem; }
        .filters { display: flex; justify-content: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
        .filters button {
            padding: 6px 16px; border: 1px solid rgba(255,255,255,0.3); background: transparent;
            color: white; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s;
        }
        .filters button:hover, .filters button.active { background: #e94560; border-color: #e94560; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .card {
            background: white; border-radius: 14px; overflow: hidden; cursor: pointer;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white;
        }
        .brand-badge { background: #e94560; padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .price { font-size: 1.3rem; font-weight: 700; color: #4ecca3; }
        .card-images { display: flex; height: 200px; overflow: hidden; background: #fafafa; }
        .card-images img {
            flex: 1; min-width: 0; object-fit: contain; padding: 8px; border-right: 1px solid #eee; background: white;
        }
        .card-images img:last-child { border-right: none; }
        .img-placeholder { flex:1; display:flex; align-items:center; justify-content:center; background:#f8f9fa; color:#aaa; font-size:0.8rem; text-align:center; padding:10px; }
        .card-body { padding: 16px; }
        .card-body h3 { font-size: 0.9rem; line-height: 1.3; color: #1a1a2e; }
        .type-badge { display:inline-block; background:#e8f4f8; color:#0f3460; padding:2px 8px; border-radius:6px; font-size:0.7rem; margin:4px 0 8px; font-weight:500; }
        .qty-badge { font-size:0.65rem; background:#fff3cd; color:#856404; padding:2px 6px; border-radius:6px; margin-left:6px; }
        .specs-mini { display:grid; grid-template-columns:1fr 1fr; gap:4px; font-size:0.75rem; color:#555; }
        .specs-mini strong { display:block; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.4px; color:#1a1a2e; }
        .view-detail { display:block; margin-top:10px; text-align:center; color:#e94560; font-size:0.8rem; font-weight:600; }

        /* Detail Page */
        .detail-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:200;
            background:rgba(0,0,0,0.6); overflow-y:auto;
        }
        .detail-overlay.active { display:block; }
        .detail-page {
            max-width:1100px; margin:30px auto; background:white; border-radius:16px;
            overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.3); animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        .detail-top {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 28px; background:linear-gradient(135deg, #1a1a2e, #0f3460); color:white;
        }
        .detail-top h2 { font-size:1.3rem; max-width:70%; }
        .detail-price { font-size:1.8rem; font-weight:700; color:#4ecca3; }
        .close-btn {
            position:absolute; top:20px; right:28px; background:rgba(255,255,255,0.15);
            border:none; color:white; width:36px; height:36px; border-radius:50%;
            font-size:1.2rem; cursor:pointer; transition:background 0.2s;
        }
        .close-btn:hover { background:rgba(255,255,255,0.3); }
        .detail-gallery { padding:24px; background:#fafafa; }
        .gallery-main {
            width:100%; max-height:400px; object-fit:contain; border-radius:10px;
            background:white; display:block; margin:0 auto; cursor:zoom-in;
        }
        .gallery-thumbs {
            display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:8px;
        }
        .gallery-thumbs img {
            width:80px; height:80px; object-fit:contain; border-radius:8px; border:2px solid transparent;
            cursor:pointer; background:white; flex-shrink:0; transition:border-color 0.2s;
        }
        .gallery-thumbs img:hover, .gallery-thumbs img.active { border-color:#e94560; }
        .detail-content { display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:24px 28px; }
        .detail-specs h3, .detail-features h3 { font-size:1rem; margin-bottom:12px; color:#0f3460; border-bottom:2px solid #e8f4f8; padding-bottom:6px; }
        .spec-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:0.85rem; }
        .spec-row .label { color:#666; }
        .spec-row .value { font-weight:600; color:#1a1a2e; text-align:right; max-width:60%; }
        .detail-features ul { list-style:none; }
        .detail-features li { font-size:0.85rem; color:#444; padding:6px 0 6px 20px; position:relative; border-bottom:1px solid #f8f8f8; }
        .detail-features li::before { content:"\2713"; position:absolute; left:0; color:#4ecca3; font-weight:bold; }
        .detail-badges { padding:0 28px 24px; display:flex; gap:8px; flex-wrap:wrap; }
        .detail-badges span {
            padding:4px 12px; border-radius:16px; font-size:0.75rem; font-weight:500;
            background:#e8f4f8; color:#0f3460;
        }
        @media (max-width:768px) {
            .grid { grid-template-columns:1fr; }
            .detail-content { grid-template-columns:1fr; }
            .detail-page { margin:10px; }
            .detail-top h2 { font-size:1rem; }
        }
    </style>
</head>

function formatPrice(p) { return 'GHS ' + p.toLocaleString(); }

function renderCards(filtered) {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  filtered.forEach((p, idx) => {
    const imgs = p.images.slice(0,3);
    const imgHTML = imgs.length > 0
      ? imgs.map(u => `<img src="${u}" alt="${p.model}" loading="lazy" onerror="this.style.display='none'">`).join('')
      : `<div class="img-placeholder">No image<br>${p.brand} ${p.model}</div>`;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.brand = p.brand;
    card.dataset.type = p.type;
    card.onclick = () => openDetail(p);
    card.innerHTML = `
      <div class="card-header">
        <div><span class="brand-badge">${p.brand}</span>${p.qty>1?`<span class="qty-badge">x${p.qty}</span>`:''}</div>
        <div class="price">${formatPrice(p.price)}</div>
      </div>
      <div class="card-images">${imgHTML}</div>
      <div class="card-body">
        <h3>${p.fullName}</h3>
        <span class="type-badge">${p.type}</span>
        <div class="specs-mini">
          <div><strong>Model</strong>${p.model}</div>
          <div><strong>Capacity</strong>${p.specs.capacity}</div>
        </div>
        <span class="view-detail">View Details &rarr;</span>
      </div>`;
    grid.appendChild(card);
  });
}

function openDetail(p) {
  const overlay = document.getElementById('detail-overlay');
  const page = document.getElementById('detail-page');
  const specRows = Object.entries(p.specs).map(([k,v]) =>
    `<div class="spec-row"><span class="label">${k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase())}</span><span class="value">${v}</span></div>`
  ).join('');
  const featuresList = p.features.map(f => `<li>${f}</li>`).join('');
  const thumbs = p.images.map((u,i) =>
    `<img src="${u}" alt="View ${i+1}" loading="lazy" class="${i===0?'active':''}" onclick="switchImage(this,'${u.replace(/'/g,"\\'")}')" onerror="this.style.display='none'">`
  ).join('');

  page.innerHTML = `
    <div class="detail-top" style="position:relative">
      <div>
        <span class="brand-badge" style="margin-right:8px">${p.brand}</span>
        <span class="type-badge" style="background:rgba(255,255,255,0.15);color:white">${p.type}</span>
        ${p.qty>1?`<span class="qty-badge">x${p.qty} units</span>`:''}
      </div>
      <div class="detail-price">${formatPrice(p.price)}</div>
      <button class="close-btn" onclick="closeDetail()">&#10005;</button>
    </div>
    <div class="detail-gallery">
      <img class="gallery-main" id="gallery-main" src="${p.images[0]||''}" alt="${p.fullName}" onerror="this.style.display='none'">
      <div class="gallery-thumbs">${thumbs}</div>
    </div>
    <div style="padding:16px 28px 0"><h2 style="font-size:1.2rem;color:#1a1a2e">${p.fullName}</h2><p style="color:#666;font-size:0.85rem;margin-top:4px">Model: ${p.model}</p></div>
    <div class="detail-content">
      <div class="detail-specs"><h3>Specifications</h3>${specRows}</div>
      <div class="detail-features"><h3>Key Features</h3><ul>${featuresList}</ul></div>
    </div>
    <div class="detail-badges">
      ${Object.entries(p.specs).filter(([k,v])=>v.toString().includes('ENERGY STAR')||v.toString().includes('ADA')||v.toString().includes('Wi-Fi')).map(([k,v])=>`<span>${v}</span>`).join('')}
    </div>`;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function switchImage(thumb, url) {
  document.getElementById('gallery-main').src = url;
  document.querySelectorAll('.gallery-thumbs img').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeDetail(); });

function filterCards(filter) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (filter === 'all') { renderCards(products); return; }
  renderCards(products.filter(p => p.brand===filter || p.type.toLowerCase().includes(filter.toLowerCase())));
}

renderCards(products);
</script>
